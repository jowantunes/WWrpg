<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Limiar - Base de Dados</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/timeline.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>


<body>
  <div id="layout-wrapper">
    <!-- Sidebar Retrátil -->
    <aside id="sidebar" class="dark-surface">
      <div class="sidebar-header">
        <h2 class="title-paranormal sidebar-logo" style="margin:0; font-size:18px;">LIMIAR</h2>
        <button id="toggle-sidebar" class="btn-ghost" style="font-size:18px;">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="/" data-link class="nav-item">
          <span class="icon">⊞</span><span class="label">Dashboard</span>
        </a>
        <a href="/categorias/personagem" data-link class="nav-item">
          <span class="icon"><i data-lucide="user"></i></span><span class="label">Personagens</span>
        </a>
        <a href="/categorias/organizacao" data-link class="nav-item">
          <span class="icon"><i data-lucide="users"></i></span><span class="label">Organizações</span>
        </a>
        <a href="/categorias/local" data-link class="nav-item">
          <span class="icon"><i data-lucide="map-pin"></i></span><span class="label">Locais</span>
        </a>
        <a href="/categorias/evento" data-link class="nav-item">
          <span class="icon"><i data-lucide="calendar"></i></span><span class="label">Eventos</span>
        </a>
        <a href="/categorias/criatura" data-link class="nav-item">
          <span class="icon"><i data-lucide="shell"></i></span><span class="label">Criaturas</span>
        </a>
        <a href="/categorias/item" data-link class="nav-item">
          <span class="icon"><i data-lucide="Backpack"></i></span><span class="label">Itens</span>
        </a>
        <a href="/timeline" data-link class="nav-item">
          <span class="icon"><i data-lucide="list"></i></span><span class="label">Timeline</span>
        </a>
        <a href="/files" data-link class="nav-item">
          <span class="icon"><i data-lucide="folder-open"></i></span><span class="label">Arquivos</span>
        </a>
        <div class="sidebar-divider"></div>
        <a href="/admin" data-link class="nav-item danger-hover" id="nav-new-entity">
          <span class="icon" style="color:var(--brand-accent);"><i data-lucide="plus"></i></span><span
            class="label">Nova Entidade</span>
        </a>
        <div id="auth-status-container"
          style="margin-top:auto; padding: 1rem; border-top: 1px solid var(--border-color);">
          <!-- Injetado via app.js -->
        </div>
      </nav>
    </aside>

    <main id="main-content">
      <div id="app"></div>
      <div style="padding-bottom: 200px;"></div>
    </main>
  </div>
  <script>
    lucide.createIcons();
  </script>
  <script>
    document.getElementById('toggle-sidebar').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });
  </script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
